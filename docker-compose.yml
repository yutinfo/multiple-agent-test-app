services:
  # MongoDB database service
  mongo:
    image: mongo:7
    container_name: kanban-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    # Optional: add healthcheck for production
    # healthcheck:
    #   test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 40s

  # Next.js application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: kanban-app
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/kanban
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      mongo:
        condition: service_started
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
      - app-next:/app/.next
    restart: unless-stopped

# Named volume for persistent MongoDB data
volumes:
  mongo-data:
    driver: local
  app-node-modules:
    driver: local
  app-next:
    driver: local
